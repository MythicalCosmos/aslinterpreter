[version]
version = "1.0.0"

[app]
name = "Asl to English Translator"
environment = "development"
fullscreen_mode = "windowed"
width = 1918
height = 879
pos_x = 1
pos_y = 31
monitor = 0
dpi_scaling = true
camera = 0
log_level = 3

[api]
base_url = "http://localhost:8080"

[gestures]
gesture_model = "testing"

[settings]
examples = 5
sam_rate = 16000
init_chunk_der = 8.0
min_chunk_der = 2.0
chunk_dec = 1.0
lines = false
confidence_threshold = 0.65
autocorrect = true
autocorrect_threshold = 0.85
word_gap = 2.0
preview_toggle = true
confidence_toggle = true

[env]
hf_token = ""
